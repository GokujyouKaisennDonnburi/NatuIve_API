basePath: /
definitions:
  github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ErrorBody:
    properties:
      code:
        description: Code は機械可読なエラーコード。
        example: unauthorized
        type: string
      message:
        description: Message は人間向けのエラーメッセージ。
        example: 認証が必要です
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ErrorBody'
    type: object
  github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.EventSummary:
    properties:
      createdAt:
        description: CreatedAt はレコード作成日時(RFC3339)。
        example: "2026-06-22T12:00:00Z"
        type: string
      eventDate:
        description: EventDate はイベント開催日時(RFC3339)。
        example: "2026-07-01T10:00:00Z"
        type: string
      id:
        description: ID はイベントの一意識別子(UUID)。
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type: string
      location:
        description: Location は開催場所（文字列）。
        example: 東京都新宿御苑
        type: string
      profileId:
        description: ProfileID は投稿者のプロフィール ID(UUID)。
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      title:
        description: Title はイベントタイトル。
        example: サクラ観察会
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.HealthResponse:
    properties:
      status:
        description: Status はサーバの稼働状態。正常時は "ok"。
        example: ok
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ProfileResponse:
    properties:
      avatarUrl:
        description: AvatarURL はアバター画像 URL(未設定なら空)。
        example: https://example.com/avatar.png
        type: string
      createdAt:
        description: CreatedAt はプロフィール作成日時(RFC3339)。
        example: "2026-06-22T12:00:00Z"
        type: string
      displayName:
        description: DisplayName は表示名(未設定なら空)。
        example: なちゅいべ太郎
        type: string
      email:
        description: Email はユーザーのメールアドレス。
        example: user@example.com
        type: string
      id:
        description: ID は Supabase Auth のユーザー ID(UUID)。
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      updatedAt:
        description: UpdatedAt はプロフィール更新日時(RFC3339)。
        example: "2026-06-22T12:00:00Z"
        type: string
    type: object
info:
  contact: {}
  description: NatuIve のバックエンド API
  title: NatuIve API
  version: "1.0"
paths:
  /api/v1/events:
    get:
      description: 公開イベントを作成日時の降順で返す。認証不要。
      parameters:
      - description: 取得件数(default 20, 最大 100)
        in: query
        name: limit
        type: integer
      - description: 取得開始位置(default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.EventSummary'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ErrorResponse'
      summary: イベント一覧取得
      tags:
      - event
  /api/v1/me:
    get:
      description: 認証済みユーザー自身のプロフィールを返す(初回アクセス時に自動作成)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 本人プロフィール取得
      tags:
      - user
  /health:
    get:
      description: サーバーが正常に稼働しているか確認する
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuIve_API_internal_model.HealthResponse'
      summary: ヘルスチェック
      tags:
      - system
securityDefinitions:
  BearerAuth:
    description: Supabase Auth が発行した JWT を "Bearer <token>" 形式で指定する
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
