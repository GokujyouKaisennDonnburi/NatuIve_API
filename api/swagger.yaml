basePath: /
definitions:
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.CreateEventRequest:
    description: イベント投稿に必要な情報。
    properties:
      capacity:
        description: Capacity は定員（任意・0=未設定・正数=定員）。
        example: 30
        minimum: 0
        type: integer
      costs:
        description: Costs は費用内訳（1件以上必須）。
        items:
          $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventCostInput'
        minItems: 1
        type: array
      description:
        description: Description はイベント説明（必須）。
        example: 春の桜を観察するイベントです。
        type: string
      eventDate:
        description: EventDate はイベント開催日時(RFC3339)（必須）。
        example: "2026-07-01T10:00:00Z"
        type: string
      externalUrl:
        description: ExternalURL は関連URLs（任意・255文字以内・http/https）。
        example: https://example.com/event
        maxLength: 255
        type: string
      imageObjectKeys:
        description: ImageObjectKeys は画像オブジェクトキーの一覧（任意）。
        items:
          type: string
        type: array
      items:
        description: Items は持ち物リスト（任意）。
        items:
          $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventItemInput'
        type: array
      location:
        description: Location は開催場所（必須・255文字以内）。
        example: 東京都新宿御苑
        maxLength: 255
        type: string
      pdfObjectKeys:
        description: PdfObjectKeys はPDFオブジェクトキーの一覧（任意・各要素255文字以内）。
        items:
          type: string
        type: array
      title:
        description: Title はイベントタイトル（必須・255文字以内）。
        example: サクラ観察会
        maxLength: 255
        type: string
    required:
    - costs
    - description
    - eventDate
    - location
    - title
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.CreateEventResponse:
    properties:
      createdAt:
        description: CreatedAt はレコード作成日時(RFC3339)。
        example: "2026-06-23T12:00:00Z"
        type: string
      id:
        description: ID は生成されたイベントの UUID。
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.CreateReportRequest:
    description: レポート投稿に必要な情報。
    properties:
      content:
        description: Content はレポート内容（必須・10,000文字以内）。
        example: 多摩川アメリカザリガニ殲滅作戦の結果、参加者：5人、アメリカザリガニ防除数：138匹でした。
        maxLength: 10000
        type: string
      eventId:
        description: EventID はレポート対象のイベントID（必須・255文字以内）。
        example: event_1234567890
        maxLength: 255
        type: string
      externalUrls:
        description: ExternalUrls は外部レポートの参照URL一覧（任意・各要素2048文字以内・http/https のみ）。
        items:
          type: string
        type: array
      imageObjectKeys:
        description: ImageObjectKeys は画像オブジェクトキーの一覧（任意）。
        items:
          type: string
        type: array
      pdfObjectKeys:
        description: PdfObjectKeys はPDFオブジェクトキーの一覧（任意・各要素255文字以内）。
        items:
          type: string
        type: array
    required:
    - content
    - eventId
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.CreateReportResponse:
    properties:
      createdAt:
        description: CreatedAt はレコード作成日時(RFC3339)。DB の TIMESTAMPTZ を UTC で保持する。
        example: "2026-06-26T03:08:24Z"
        type: string
      reportId:
        description: ReportID は作成されたレポートのID。
        example: report_1234567890
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ErrorBody:
    properties:
      code:
        description: Code は機械可読なエラーコード。
        example: internal_error
        type: string
      message:
        description: Message は人間向けのエラーメッセージ。
        example: サーバー内部でエラーが発生しました
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ErrorBody'
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventCostInput:
    properties:
      category:
        description: 'Category は費用カテゴリ（例: "参加費"）。'
        maxLength: 255
        type: string
      cost:
        description: Cost は費用（円）。0 以上の整数。
        minimum: 0
        type: integer
    required:
    - category
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventCostResponse:
    properties:
      category:
        type: string
      cost:
        type: integer
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventItemInput:
    properties:
      isRequired:
        description: IsRequired は必須かどうか。
        type: boolean
      item:
        description: 'Item は持ち物名（例: "双眼鏡"）。'
        maxLength: 255
        type: string
    required:
    - item
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventItemResponse:
    properties:
      isRequired:
        type: boolean
      item:
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventListResponse:
    properties:
      events:
        description: Events はイベントサマリーの一覧。
        items:
          $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventSummary'
        type: array
      limit:
        description: Limit は正規化後の実際に使われた取得件数。
        example: 20
        type: integer
      offset:
        description: Offset は正規化後の実際に使われた取得開始位置。
        example: 0
        type: integer
      totalCount:
        description: TotalCount はフィルタなし全件数。クライアントが最終ページ offset を算出するために使う。
        example: 153
        type: integer
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventResponse:
    properties:
      capacity:
        type: integer
      costs:
        items:
          $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventCostResponse'
        type: array
      createdAt:
        type: string
      description:
        type: string
      eventDate:
        type: string
      externalUrl:
        type: string
      id:
        type: string
      imageObjectKeys:
        items:
          type: string
        type: array
      imageUrls:
        description: |-
          ImageUrls は ImageObjectKeys に対応する表示用の完全URL。
          公開ベースURL（R2_PUBLIC_BASE_URL）未設定時は空配列。
        items:
          type: string
        type: array
      items:
        items:
          $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventItemResponse'
        type: array
      location:
        type: string
      pdfObjectKeys:
        items:
          type: string
        type: array
      pdfUrls:
        description: |-
          PdfUrls は PdfObjectKeys に対応する表示用の完全URL。
          公開ベースURL（R2_PUBLIC_BASE_URL）未設定時は空配列。
        items:
          type: string
        type: array
      profile:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ProfileSummary'
      title:
        type: string
      updatedAt:
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventSummary:
    properties:
      createdAt:
        description: CreatedAt はレコード作成日時(RFC3339)。
        example: "2026-06-22T12:00:00Z"
        type: string
      eventDate:
        description: EventDate はイベント開催日時(RFC3339)。
        example: "2026-07-01T10:00:00Z"
        type: string
      id:
        description: ID はイベントの一意識別子(UUID)。
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type: string
      location:
        description: Location は開催場所（文字列）。
        example: 東京都新宿御苑
        type: string
      profile:
        allOf:
        - $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ProfileSummary'
        description: ProfileSummary は投稿者プロフィールのサマリー情報。
      profileId:
        description: ProfileID は投稿者のプロフィール ID(UUID)。
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      title:
        description: Title はイベントタイトル。
        example: サクラ観察会
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ForbiddenErrorBody:
    properties:
      code:
        description: Code は機械可読なエラーコード。
        example: forbidden
        type: string
      message:
        description: Message は人間向けのエラーメッセージ。
        example: このイベントにレポートを投稿する権限がありません
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ForbiddenErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ForbiddenErrorBody'
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.HealthResponse:
    properties:
      status:
        description: Status はサーバの稼働状態。正常時は "ok"。
        example: ok
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.InternalErrorBody:
    properties:
      code:
        description: Code は機械可読なエラーコード。
        example: internal_error
        type: string
      message:
        description: Message は人間向けのエラーメッセージ。
        example: サーバー内部でエラーが発生しました
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.InternalErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.InternalErrorBody'
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.JoinEventRequest:
    properties:
      eventId:
        description: EventID は参加したいイベントのUUID
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        maxLength: 255
        type: string
      mailAddress:
        description: MailAddressは参加するユーザーのメールアドレス(必須)
        example: yamada@example.com
        maxLength: 255
        type: string
      profileId:
        description: ProfileID は参加するユーザーのUUID(あれば)
        example: b2c3d4e5-f6a7-8901-bcde-f23456789012
        type: string
      username:
        description: Usenameは参加するユーザーの表示名(必須)
        example: 山田太郎
        maxLength: 255
        type: string
    required:
    - eventId
    - mailAddress
    - username
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.JoinEventResponse:
    properties:
      createdAt:
        description: CreatedAt は参加申込日時
        example: "2023-01-01T12:00:00Z"
        type: string
      eventId:
        description: EventID は参加したイベントのUUID
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type: string
      mailAddress:
        description: MailAddressは参加するユーザーのメールアドレス(必須)
        example: hirakouki41@gmail.com
        type: string
      profileId:
        description: ProfileID は参加するユーザーのUUID(あれば)
        example: b2c3d4e5-f6a7-8901-bcde-f23456789012
        type: string
      username:
        description: Usenameは参加するユーザーの表示名(必須)
        example: ヒラコウキ
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.PresignRequest:
    description: アップロード用署名付き URL の発行リクエスト。
    properties:
      contentType:
        description: |-
          ContentType は MIME タイプ。
          画像: "image/jpeg" / "image/png"
          PDF: "application/pdf"
        example: image/jpeg
        type: string
      kind:
        description: Kind はアップロードするファイルの種別。"image" または "pdf" のみ有効。
        enum:
        - image
        - pdf
        example: image
        type: string
    required:
    - contentType
    - kind
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.PresignResponse:
    description: アップロード用署名付き URL とオブジェクトキー。
    properties:
      expiresAt:
        description: ExpiresAt は署名付き URL の有効期限(RFC3339)。
        example: "2026-07-01T10:05:00Z"
        type: string
      objectKey:
        description: ObjectKey はアップロード先のオブジェクトキー。イベント作成時に imageObjectKeys/pdfObjectKeys
          に渡す。
        example: natueve/tmp/profile-uuid/uuid.jpg
        type: string
      uploadUrl:
        description: UploadURL はファイルを直接 PUT するための署名付き URL。
        example: https://xxxxx.r2.cloudflarestorage.com/natuportal/natueve/tmp/profile-uuid/uuid.jpg?X-Amz-...
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ProfilePublic:
    properties:
      avatarUrl:
        description: AvatarURL はアバター画像 URL(未設定なら空)。
        example: https://example.com/avatar.png
        type: string
      description:
        description: Description は自己紹介(未設定なら空)。
        example: イベントを楽しむのが好きです。
        type: string
      displayName:
        description: DisplayName は表示名(未設定なら空)。
        example: なちゅいべ太郎
        type: string
      id:
        description: ID は Supabase Auth のユーザー ID(UUID)。
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ProfileResponse:
    properties:
      avatarUrl:
        description: AvatarURL はアバター画像 URL(未設定なら空)。
        example: https://example.com/avatar.png
        type: string
      createdAt:
        description: CreatedAt はプロフィール作成日時(RFC3339)。
        example: "2026-06-22T12:00:00Z"
        type: string
      description:
        description: Description は自己紹介(未設定なら空)。
        example: イベントを楽しむのが好きです。
        type: string
      displayName:
        description: DisplayName は表示名(未設定なら空)。
        example: なちゅいべ太郎
        type: string
      email:
        description: Email はユーザーのメールアドレス。
        example: user@example.com
        type: string
      id:
        description: ID は Supabase Auth のユーザー ID(UUID)。
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
      updatedAt:
        description: UpdatedAt はプロフィール更新日時(RFC3339)。
        example: "2026-06-22T12:00:00Z"
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ProfileSummary:
    properties:
      avatarUrl:
        description: AvatarURL はアバター画像 URL(未設定なら空)。
        example: https://example.com/avatar.png
        type: string
      displayName:
        description: DisplayName は表示名(未設定なら空)。
        example: なちゅいべ太郎
        type: string
      id:
        description: ID は Supabase Auth のユーザー ID(UUID)。
        example: d290f1ee-6c54-4b01-90e6-d701748f0851
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ReportResponse:
    properties:
      content:
        description: Content はレポート内容。
        example: 多摩川アメリカザリガニ殲滅作戦の結果、参加者：5人、防除数：138匹でした。
        type: string
      createdAt:
        description: CreatedAt はレコード作成日時(RFC3339)。
        example: "2026-06-26T03:08:24Z"
        type: string
      eventId:
        description: EventID は対象イベントのID(UUID)。
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type: string
      externalUrls:
        description: ExternalUrls は外部レポートの参照URLの一覧。無ければ空配列。
        items:
          type: string
        type: array
      id:
        description: ID はレポートの一意識別子(UUID)。
        example: b2c3d4e5-f6a7-8901-bcde-f23456789012
        type: string
      imageObjectKeys:
        description: ImageObjectKeys は画像オブジェクトキーの一覧。
        items:
          type: string
        type: array
      imageUrls:
        description: |-
          ImageUrls は ImageObjectKeys に対応する表示用の完全URL。
          公開ベースURL（R2_PUBLIC_BASE_URL）未設定時は空配列。
        items:
          type: string
        type: array
      pdfObjectKeys:
        description: PdfObjectKeys は PDF オブジェクトキーの一覧。
        items:
          type: string
        type: array
      pdfUrls:
        description: |-
          PdfUrls は PdfObjectKeys に対応する表示用の完全URL。
          公開ベースURL（R2_PUBLIC_BASE_URL）未設定時は空配列。
        items:
          type: string
        type: array
      updatedAt:
        description: UpdatedAt はレコード更新日時(RFC3339)。
        example: "2026-06-26T03:08:24Z"
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.UnauthorizedErrorBody:
    properties:
      code:
        description: Code は機械可読なエラーコード。
        example: unauthorized
        type: string
      message:
        description: Message は人間向けのエラーメッセージ。
        example: 認証が必要です
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.UnauthorizedErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.UnauthorizedErrorBody'
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ValidationErrorBody:
    properties:
      code:
        description: Code は機械可読なエラーコード。
        example: invalid_request
        type: string
      message:
        description: Message は人間向けのエラーメッセージ。
        example: タイトルは必須です
        type: string
    type: object
  github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ValidationErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ValidationErrorBody'
    type: object
info:
  contact: {}
  description: NatuEve のバックエンド API
  title: NatuEve API
  version: "1.0"
paths:
  /api/v1/events:
    get:
      description: |-
        公開イベントを指定ソート順で返す。認証不要。
        sort は "created_at"(デフォルト) / "event_date" のみ許可。不正値はデフォルトに戻す。
        order は "desc"(デフォルト) / "asc" のみ許可。不正値はデフォルトに戻す。
        prifileはProfileSummaryを返す。
      parameters:
      - description: 'ソートカラム(created_at|event_date, default: created_at)'
        in: query
        name: sort
        type: string
      - description: 'ソート順(asc|desc, default: desc)'
        in: query
        name: order
        type: string
      - description: 取得件数(default 20, 最大 100)
        in: query
        name: limit
        type: integer
      - description: 取得開始位置(default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.EventListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.InternalErrorResponse'
      summary: イベント一覧取得
      tags:
      - event
    post:
      consumes:
      - application/json
      description: 認証済みユーザーが新規イベントを投稿する。
      parameters:
      - description: イベント投稿リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.CreateEventResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.ValidationErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.UnauthorizedErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_GokujyouKaisennDonnburi_NatuEve_API_internal_model.InternalErrorResponse'
      security:
      - BearerAuth: []
      summary: イベント投稿
      tags:
      - event
  /api/v1/events/{id}:
    get:
      description: 指定されたイベントIDの詳細情報を取得する
      parameters:
