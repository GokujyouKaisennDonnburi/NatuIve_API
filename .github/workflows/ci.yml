name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install swag (pinned)
        run: make swag-install

      - name: Check generated docs are up to date
        run: make swag-check

      - name: Vet
        run: make vet

      - name: Install golangci-lint (pinned)
        run: make lint-install

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test
        run: make test

  migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: NatuEve
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d NatuEve"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://app:app@localhost:5432/NatuEve?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply migrations
        run: make migrate-up GOOSE_EXEC='sh -c'

      - name: Verify down/up roundtrip
        run: make migrate-down GOOSE_EXEC='sh -c' && make migrate-up GOOSE_EXEC='sh -c'
