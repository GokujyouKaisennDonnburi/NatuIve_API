name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install swag (pinned)
        run: make swag-install

      - name: Check generated docs are up to date
        run: make swag-check

      - name: Vet
        run: make vet

      - name: Install golangci-lint (pinned)
        run: make lint-install

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test
        run: make test
