# golangci-lint 設定（v2 形式）。実行: `make lint`
# 標準セット(errcheck/govet/ineffassign/staticcheck/unused)に
# バックエンドで有用なリンタを追加する。
version: "2"

linters:
  default: standard
  enable:
    - bodyclose    # HTTP レスポンスボディの Close 漏れ
    - errorlint    # errors.Is/As を使わない誤った比較・%w の検出
    - gocritic     # よくあるバグ・冗長コードの指摘
    - gosec        # セキュリティ上問題のあるコード
    - misspell     # コメント・文字列のスペルミス
    - revive       # golint 後継のスタイルチェック
  exclusions:
    rules:
      # 生成物は対象外（手編集禁止の swag 生成物）。
      - path: ^api/
        linters:
          - all

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - ^api/
