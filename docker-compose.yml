# 開発用: コンテナ内で `go run .` を実行する。
# ソースをマウントしているので、再起動すれば変更が反映される。
services:
  api:
    image: golang:1.26.4-alpine
    working_dir: /app
    command: go run .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      # モジュールキャッシュを永続化して毎回のダウンロードを避ける
      - go-mod-cache:/go/pkg/mod
    # PORT / TRUSTED_PROXIES などはマウントした .env を godotenv が読み込む

volumes:
  go-mod-cache:
