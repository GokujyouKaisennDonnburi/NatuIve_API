# 開発用: コンテナ内で Air を実行し、ソース変更を検知して自動で再ビルド・再起動する。
# ソースをマウントしているので、ホスト側の編集がそのままホットリロードされる。
services:
  api:
    image: golang:1.26.4-alpine
    working_dir: /app
    # Air をバージョン固定で導入してから起動する。設定は .air.toml。
    command: sh -c "go install github.com/air-verse/air@v1.63.6 && air"
    ports:
      - "8085:8085"
    volumes:
      - .:/app
      # モジュールキャッシュを永続化して毎回のダウンロードを避ける
      - go-mod-cache:/go/pkg/mod
      # ビルドキャッシュも永続化して air の再ビルドを高速化する
      - go-build-cache:/root/.cache/go-build
    # PORT / TRUSTED_PROXIES などはマウントした .env を godotenv が読み込む。
    # DB 接続先と起動時マイグレーションはコンテナ向けにここで明示する
    # (godotenv の Load は既存の環境変数を上書きしないため、これが優先される)。
    environment:
      DATABASE_URL: postgres://app:app@db:5432/NatuEve?sslmode=disable
      DB_AUTO_MIGRATE: "true"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: NatuEve
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d NatuEve"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  go-mod-cache:
  go-build-cache:
  db-data:
